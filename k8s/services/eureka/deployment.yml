apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: ems
  labels:
    app: eureka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      initContainers:
        - name: wait-config
          image: busybox
          command: ['sh', '-c',
            'until wget -qO- http://config-server:8888/actuator/health; do echo waiting; sleep 5; done']

      containers:
        - name: eureka
          image: sidaouimohamedamine/eureka:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8761

          envFrom:
            - configMapRef:
                name: app-config

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888

            - name: EUREKA_INSTANCE_HOSTNAME
              value: eureka

            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"

            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:8761/eureka/

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: ems
spec:
  selector:
    app: eureka
  ports:
    - name: http
      port: 8761
      targetPort: 8761
  type: ClusterIP