<p-card styleClass="card-table">

  <div class="table-header">
    <h2>Teams</h2>
  </div>

  <p-table [value]="teams" [paginator]="true" [rows]="8">

    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Employees</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-team>
      <tr>
        <td>{{ team.name }}</td>
        <td>{{ team.description }}</td>
        <td><span class="badge">{{ team.employees?.length }}</span></td>
        <td>
          <button pButton icon="pi pi-eye" class="p-button-text"></button>
          <button pButton icon="pi pi-pencil" class="p-button-text"></button>
          <button pButton icon="pi pi-trash" class="p-button-text p-button-danger"></button>
        </td>
      </tr>
    </ng-template>

  </p-table>

</p-card>
